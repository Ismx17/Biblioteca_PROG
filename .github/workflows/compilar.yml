name: Java Library CI

on:
  push:
    branches: [ "main", "master", "trunk" ]
  pull_request:
    branches: [ "main", "master", "trunk" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Listar archivos para depurar
      run: |
        echo "Buscando archivos .jar..."
        find . -name "*.jar"
        echo "Buscando archivos .java..."
        find src -name "*.java" | head -n 5

    - name: Compilar Proyecto Java
      run: |
        mkdir -p bin
        # Buscamos el JAR y los fuentes dinámicamente para que no falle la ruta
        JAR_FILE=$(find libs -name "*.jar")
        SOURCES=$(find src -name "*.java")
        javac -d bin -cp "$JAR_FILE" $SOURCES
        echo "✅ Compilación exitosa verificada."
