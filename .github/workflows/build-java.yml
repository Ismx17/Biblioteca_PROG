name: Java Build Check
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Compile Library App
        run: |
          mkdir -p out
          find . -name "*.java" > sources.txt
          javac -d out @sources.txt
